<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Cafe Order System</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-5xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-8">
        
        <div class="bg-white p-6 rounded-lg shadow">
            <h2 class="text-2xl font-bold mb-4 border-b pb-2">Menu</h2>
            <div class="space-y-4">
                <div class="flex justify-between items-center p-3 border rounded hover:bg-gray-50">
                    <div>
                        <p class="font-semibold text-lg">Cà phê đen đá</p>
                        <p class="text-blue-600">25.000đ</p>
                    </div>
                    <button onclick="addToCart(1, 'Cà phê đen đá', 25000)" class="bg-green-500 text-white px-4 py-2 rounded hover:bg-green-600">+ Thêm</button>
                </div>
                <div class="flex justify-between items-center p-3 border rounded hover:bg-gray-50">
                    <div>
                        <p class="font-semibold text-lg">Cà phê đen nóng</p>
                        <p class="text-blue-600">25.000đ</p>
                    </div>
                    <button onclick="addToCart(2, 'Cà phê đen nóng', 25000)" class="bg-green-500 text-white px-4 py-2 rounded hover:bg-green-600">+ Thêm</button>
                </div>
            </div>
        </div>

        <div class="bg-white p-6 rounded-lg shadow border-t-4 border-blue-500">
            <h2 class="text-2xl font-bold mb-4 border-b pb-2">Giỏ hàng</h2>
            <div id="cart-items" class="min-h-[100px] mb-4 text-gray-500 italic">Chưa có món nào...</div>
            
            <div class="border-t pt-4">
                <div class="flex justify-between text-xl font-bold mb-4">
                    <span>Tổng tiền:</span>
                    <span id="cart-total" class="text-red-600">0đ</span>
                </div>

                <div class="space-y-3 text-sm">
                    <div>
                        <label class="block font-medium">Nguồn đơn:</label>
                        <select id="orderSource" class="w-full border p-2 rounded">
                            <option value="WEB">WEB (Online)</option>
                            <option value="OFFLINE">OFFLINE (Tại quầy)</option>
                        </select>
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block font-medium">Table ID:</label>
                            <input type="number" id="tableId" value="1" class="w-full border p-2 rounded">
                        </div>
                        <div>
                            <label class="block font-medium">User ID:</label>
                            <input type="number" id="userId" value="10" class="w-full border p-2 rounded">
                        </div>
                    </div>
                    <div>
                        <label class="block font-medium">Phương thức thanh toán:</label>
                        <select id="paymentMethod" class="w-full border p-2 rounded">
                            <option value="CASH">Tiền mặt</option>
                            <option value="BANK_TRANSFER">Chuyển khoản</option>
                        </select>
                    </div>
                </div>

                <button onclick="submitOrder()" id="btnSubmit" class="w-full bg-blue-600 text-white font-bold py-3 mt-6 rounded hover:bg-blue-700 disabled:bg-gray-400">
                    TẠO ĐƠN HÀNG & THANH TOÁN
                </button>
            </div>
        </div>
    </div>

    <script>
        let cart = [];

        function addToCart(id, name, price) {
            const existingItem = cart.find(i => i.productId === id);
            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                cart.push({ productId: id, name: name, price: price, quantity: 1 });
            }
            renderCart();
        }

        function renderCart() {
            const cartDiv = document.getElementById('cart-items');
            const totalSpan = document.getElementById('cart-total');
            if (cart.length === 0) {
                cartDiv.innerHTML = "Chưa có món nào...";
                totalSpan.innerText = "0đ";
                return;
            }

            let total = 0;
            cartDiv.innerHTML = cart.map((item, index) => {
                total += item.price * item.quantity;
                return `
                    <div class="flex justify-between items-center mb-2 bg-gray-50 p-2 rounded">
                        <span>${item.name} x ${item.quantity}</span>
                        <span class="font-medium">${(item.price * item.quantity).toLocaleString()}đ</span>
                    </div>
                `;
            }).join('');
            totalSpan.innerText = total.toLocaleString() + "đ";
        }

        async function submitOrder() {
            if (cart.length === 0) return alert("Giỏ hàng đang trống!");

            // BUILD REQUEST BODY ĐÚNG CHUẨN BACKEND
            const requestData = {
                orderSource: document.getElementById('orderSource').value,
                tableId: parseInt(document.getElementById('tableId').value),
                userId: parseInt(document.getElementById('userId').value),
                employeeId: 1, // Mặc định cho admin
                status: "PAID",
                totalAmount: cart.reduce((sum, item) => sum + (item.price * item.quantity), 0),
                paymentMethod: document.getElementById('paymentMethod').value,
                items: cart.map(item => ({
                    productId: item.productId,
                    quantity: item.quantity,
                    price: item.price
                }))
            };

            console.log("Sending Data:", requestData);

            try {
                const response = await fetch('http://localhost:8080/api/orders', { // Thay URL của bạn ở đây
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestData)
                });

                if (response.ok) {
                    const result = await response.json();
                    alert("Tạo đơn thành công! ID Đơn: " + result.id);
                    cart = [];
                    renderCart();
                } else {
                    const error = await response.text();
                    alert("Lỗi: " + error);
                }
            } catch (err) {
                alert("Không thể kết nối đến Backend (Kiểm tra CORS hoặc Server đang chạy)");
            }
        }
    </script>
</body>
</html>
