<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="sign_up">
        <div class="image">
            <img src="/image/side_picture.avif" alt="image">
        </div>
        <form id="resetForm" class="form_signin" action="javascript:void(0)">
            <div class="head_form">
                <h1 class="title">Reset Password</h1>
                <p class="description">Enter your new password</p>
            </div>
            <div class="body_form">
                <input type="hidden" id="token" th:value="${token}">
                <input type="hidden" id="userId" th:value="${userId}">
                <div class="password_field">
                    <label for="newPassword">New Password</label>
                    <input type="password" name="newPassword" id="newPassword" placeholder="New Password" required minlength="8">
                    <span></span>
                </div>
                <div class="password_field">
                    <label for="confirmPassword">Confirm New Password</label>
                    <input type="password" name="confirmPassword" id="confirmPassword" placeholder="Confirm Password" required minlength="8">
                    <span></span>
                </div>
            </div>
            <div class="foot_form">
                <button id="btn" type="submit">Reset Password</button>
                <p><a href="login.html"><span class="sign">Back to Login</span></a></p>
            </div>
        </form>
    </div>
    <script>
        document.getElementById('resetForm').addEventListener('submit', async function(event) {
            event.preventDefault();
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const token = document.getElementById('token').value;
            const userId = document.getElementById('userId').value;

            if (newPassword !== confirmPassword) {
                alert('Passwords do not match');
                return;
            }

            try {
                const response = await fetch('/api/resetPassword', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ userId: parseInt(userId), newPassword: newPassword, token: token })
                });
                const result = await response.text();
                alert(result);
                if (response.ok) {
                    window.location.href = 'login.html';
                }
            } catch (error) {
                alert('Error resetting password');
            }
        });
    </script>
</body>
</html>
