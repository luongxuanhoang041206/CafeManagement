<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="sign_up">
        <div class="image">
            <img src="/image/side_picture.avif" alt="image">
        </div>
        <form id="forgotForm" class="form_signin" action="javascript:void(0)">
            <div class="head_form">
                <h1 class="title">Forgot Password</h1>
                <p class="description">Enter your email or username to reset your password</p>
            </div>
            <div class="body_form">
                <div class="email_user">
                    <label for="info">Email or Username</label>
                    <input name="info" id="info" placeholder="abc@gmail.com" required>
                    <span></span>
                </div>
            </div>
            <div class="foot_form">
                <button id="btn" type="submit">Send Reset Link</button>
                <p>Remember your password? <a href="login.html"><span class="sign">Log in</span></a></p>
            </div>
        </form>
    </div>
    <script>
        document.getElementById('forgotForm').addEventListener('submit', async function(event) {
            event.preventDefault();
            const info = document.getElementById('info').value;
            const btn = document.getElementById('btn');

            btn.disabled = true;
            btn.innerText = "Processing...";

            try {
                const response = await fetch('/api/requestResetToken', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    // Gửi ĐÚNG tên trường 'info' mà Java đang chờ (TokenRequestDTO)
                    body: JSON.stringify({ info: info }) 
                });

                // Kiểm tra xem server có trả về JSON không
                const contentType = response.headers.get("content-type");
                let result = {};
                if (contentType && contentType.includes("application/json")) {
                    result = await response.json();
                }

                if (response.ok) {
                    alert('Reset link sent to your email!');
                } else {
                    // Nếu lỗi 400, 401... thì hiện thông báo từ server hoặc mặc định
                    alert('Error: ' + (result.token || 'Something went wrong on server'));
                }
            } catch (error) {
                console.error("Detail error:", error); // Log ra console để bạn debug cho dễ
                alert('Cannot connect to server. Please check your network or CSRF settings.');
            } finally {
                btn.disabled = false;
                btn.innerText = "Send Reset Link";
            }
        });
    </script>
</body>
</html>
